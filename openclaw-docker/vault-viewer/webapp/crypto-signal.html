<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FORM_TITLE}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--tg-theme-bg-color, #1a1a2e);
    color: var(--tg-theme-text-color, #e0e0e0);
    padding: 16px;
    max-width: 800px;
    margin: 0 auto;
    line-height: 1.6;
  }
  h1 { font-size: 1.3em; margin: 0.5em 0; color: #fff; }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid #333;
    border-radius: 12px;
    padding: 14px;
    margin: 10px 0;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.8em;
    font-weight: 600;
  }
  .badge-buy { background: rgba(80,200,120,0.2); color: #5cb87a; }
  .badge-sell { background: rgba(220,80,100,0.2); color: #dc5064; }
  .badge-neutral { background: rgba(100,150,255,0.2); color: #6496ff; }
  .badge-skip { background: rgba(150,150,150,0.15); color: #888; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #2a2a3a; }
  .row:last-child { border-bottom: none; }
  .label { color: #666; font-size: 0.88em; }
  .value { font-weight: 500; }
  .value.positive { color: #5cb87a; }
  .value.negative { color: #dc5064; }
  .signal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .signal-symbol { font-size: 1.2em; font-weight: 700; color: #fff; }
  .signal-type { font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em; }
  .meta { font-size: 0.78em; color: #555; margin-top: 10px; }
  .divider { border: none; border-top: 1px solid #2a2a3a; margin: 12px 0; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  .btn {
    flex: 1; min-width: 100px; padding: 10px 12px;
    border: none; border-radius: 8px; font-size: 0.9em;
    font-weight: 500; cursor: pointer; transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.75; }
  .btn-primary {
    background: var(--tg-theme-button-color, #3390ec);
    color: var(--tg-theme-button-text-color, #fff);
  }
  .btn-buy { background: rgba(80,200,120,0.25); color: #5cb87a; }
  .btn-skip { background: rgba(100,100,100,0.15); color: #888; }
  .btn-close { background: rgba(255,255,255,0.07); color: #999; }
  .loading { text-align: center; padding: 40px; color: #666; }
</style>
</head>
<body>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<div id="app">
  <div class="loading">Loading signal data...</div>
</div>

<script>
  const tg = window.Telegram && Telegram.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // Parse form data from URL
  const params = new URLSearchParams(window.location.search);
  const formId = params.get('id');
  const formDataEl = document.getElementById('form-data');
  let data = {};

  try {
    data = formDataEl ? JSON.parse(formDataEl.textContent) : {};
  } catch(e) {}

  // Fallback: load from /tmp cache if formId present
  async function loadData() {
    if (formId && Object.keys(data).length === 0) {
      try {
        const res = await fetch('/a2ui/report?id=' + formId);
        // Cache not accessible from browser - use embedded data
      } catch(e) {}
    }
    render(data);
  }

  function render(d) {
    const app = document.getElementById('app');
    const type = d.formType || d.type || 'crypto-signal';
    const signal = d.formData || d.signal || d || {};

    let badge = '<span class="badge badge-neutral">Signal</span>';
    if (signal.direction === 'BUY' || signal.action === 'buy') badge = '<span class="badge badge-buy">📈 BUY</span>';
    else if (signal.direction === 'SELL' || signal.action === 'sell') badge = '<span class="badge badge-sell">📉 SELL</span>';

    let priceClass = '';
    if (signal.price_change_pct > 0) priceClass = 'positive';
    else if (signal.price_change_pct < 0) priceClass = 'negative';

    const symbol = signal.symbol || signal.coin || '—';
    const direction = signal.direction || signal.action || '—';
    const price = signal.price || signal.current_price || '—';
    const change = signal.price_change_pct != null ? signal.price_change_pct.toFixed(2) + '%' : '—';
    const volume = signal.volume_24h ? formatVolume(signal.volume_24h) : '—';
    const marketCap = signal.market_cap ? formatVolume(signal.market_cap) : '—';
    const source = signal.source || signal.exchange || 'Binance';
    const ts = signal.timestamp || signal.generatedAt || d.createdAt || '';
    const time = ts ? new Date(ts).toLocaleString('en-US', {timeZone:'Asia/Tashkent'}) : '';

    app.innerHTML = `
      <h1>${d.formTitle || 'Crypto Signal'}</h1>

      <div class="card">
        <div class="signal-header">
          <span class="signal-symbol">{{SYM}}</span>
          <span>{{BADGE}}</span>
        </div>

        <hr class="divider">

        <div class="row">
          <span class="label">Direction</span>
          <span class="value" style="color:${direction==='BUY'?'#5cb87a':direction==='SELL'?'#dc5064':'#ccc'}">{{DIR}}</span>
        </div>
        <div class="row">
          <span class="label">Price</span>
          <span class="value">{{PRICE}}</span>
        </div>
        <div class="row">
          <span class="label">24h Change</span>
          <span class="value {{PCLASS}}">{{CHANGE}}</span>
        </div>
        <div class="row">
          <span class="label">Volume (24h)</span>
          <span class="value">{{VOL}}</span>
        </div>
        <div class="row">
          <span class="label">Market Cap</span>
          <span class="value">{{MCAP}}</span>
        </div>
        <div class="row">
          <span class="label">Source</span>
          <span class="value">{{SRC}}</span>
        </div>

        ${signal.reason ? `<p style="margin-top:10px;color:#888;font-size:0.88em;">{{REASON}}</p>` : ''}

        <div class="meta">{{TIME}} (Tashkent)</div>
      </div>

      <div class="actions">
        <button class="btn btn-buy" onclick="sendAction('buy', '{{SYMSAFE}}')">📈 Buy</button>
        <button class="btn btn-skip" onclick="sendAction('skip', '{{SYMSAFE}}')">⏭ Skip</button>
        <button class="btn btn-close" onclick="closeApp()">Close</button>
      </div>
    `;
  }

  function formatVolume(n) {
    if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
    if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
    if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
    return '$' + n.toFixed(0);
  }

  function sendAction(action, symbol) {
    if (tg) {
      const payload = JSON.stringify({ action, symbol, formId });
      tg.sendData(payload);
      tg.close();
    } else {
      alert(`Action: ${action} {{SYM}}`);
    }
  }

  function closeApp() {
    if (tg) tg.close();
    else window.close();
  }

  // Auto-load
  if (formDataEl && formDataEl.textContent.trim()) {
    render(data);
  } else {
    loadData();
  }
</script>

<!-- Embedded form data (populated by server) -->
<script id="form-data" type="application/json">{{FORM_DATA}}</script>

</body>
</html>
