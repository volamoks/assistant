<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{FORM_TITLE}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--tg-theme-bg-color, #1a1a2e);
    color: var(--tg-theme-text-color, #e0e0e0);
    padding: 16px;
    max-width: 800px;
    margin: 0 auto;
    line-height: 1.6;
  }
  h1 { font-size: 1.3em; margin: 0.5em 0; color: #fff; }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid #333;
    border-radius: 12px;
    padding: 14px;
    margin: 10px 0;
  }
  .card-title { font-size: 1.05em; font-weight: 600; color: #fff; margin-bottom: 8px; }
  .row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #2a2a3a; }
  .row:last-child { border-bottom: none; }
  .label { color: #666; font-size: 0.88em; }
  .value { font-weight: 500; text-align: right; }
  .value.positive { color: #5cb87a; }
  .value.negative { color: #dc5064; }
  .meta { font-size: 0.78em; color: #555; margin-top: 10px; }
  .actions { display: flex; gap: 8px; margin-top: 16px; }
  .btn {
    flex: 1; padding: 10px;
    border: none; border-radius: 8px;
    font-size: 0.9em; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.75; }
  .btn-primary {
    background: var(--tg-theme-button-color, #3390ec);
    color: var(--tg-theme-button-text-color, #fff);
  }
  .btn-secondary { background: rgba(255,255,255,0.07); color: #999; }
  .loading { text-align: center; padding: 40px; color: #666; }
</style>
</head>
<body>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<div id="app"><div class="loading">Loading report...</div></div>

<script>
  const tg = window.Telegram && Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  function render(data) {
    const app = document.getElementById('app');
    if (!data || Object.keys(data).length === 0) {
      app.innerHTML = '<div class="loading">No data available</div>';
      return;
    }

    const title = data.title || data.label || '{{FORM_TITLE}}';
    const type = data.formType || data.type || 'report';
    const ts = data.timestamp || data.generatedAt || data.createdAt || '';
    const time = ts ? new Date(ts).toLocaleString('en-US', {timeZone:'Asia/Tashkent'}) : '';

    let body = `<h1>${escapeHtml(title)}</h1>`;

    // Generic data display
    body += '<div class="card">';
    for (const [key, val] of Object.entries(data)) {
      if (['title', 'label', 'type', 'formType', 'timestamp', 'generatedAt', 'createdAt', 'id'].includes(key)) continue;
      const displayKey = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      const displayVal = typeof val === 'object' ? JSON.stringify(val) : String(val);
      const valClass = typeof val === 'number' && val > 0 ? 'positive' : typeof val === 'number' && val < 0 ? 'negative' : '';
      body += `<div class="row">
        <span class="label">${escapeHtml(displayKey)}</span>
        <span class="value ${valClass}">${escapeHtml(displayVal)}</span>
      </div>`;
    }
    body += '</div>';

    if (time) body += `<div class="meta">${escapeHtml(time)} (Tashkent)</div>`;

    body += '<div class="actions">';
    body += '<button class="btn btn-secondary" onclick="closeApp()">Close</button>';
    body += '</div>';

    app.innerHTML = body;
  }

  function closeApp() {
    if (tg) tg.close();
    else window.close();
  }

  function escapeHtml(s) {
    if (s == null) return '';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  const dataEl = document.getElementById('form-data');
  let data = {};
  try { data = JSON.parse(dataEl.textContent || '{}'); } catch(e) {}
  render(data);
</script>

<script id="form-data" type="application/json">{{FORM_DATA}}</script>
</body>
</html>
