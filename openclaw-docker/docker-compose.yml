services:
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    networks:
      - default
      - jarvis_net

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      - "18788:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
      - ./litellm/.env:/app/.env
    environment:
      # No master key — LiteLLM accepts any Bearer token from openclaw
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - VERTEXAI_PROJECT=${LITELLM_VERTEX_PROJECT}
      - GOOGLE_OAUTH_ACCESS_TOKEN=${LITELLM_GOOGLE_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - redis
    command: --config /app/config.yaml --port 4000 --num_workers 1
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=0
    deploy:
      resources:
        limits:
          memory: 6g
          cpus: '4.0'
    networks:
      - default
      - jarvis_net

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - ./chroma:/chroma/chroma
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.5'
    networks:
      - default
      - jarvis_net

  openclaw:
    image: ghcr.io/openclaw/openclaw:main
    container_name: openclaw-latest
    restart: unless-stopped
    # user: "root"  # Change to non-root if needed
    command: [ "sh", "-c", "npm install -g @google/gemini-cli --loglevel=error 2>/dev/null || true; exec node openclaw.mjs gateway --allow-unconfigured --bind lan" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18789:18789"
    depends_on:
      - litellm
    volumes:
      - ./core:/home/node/.openclaw
      - ./prompts:/home/node/.openclaw/prompts
      - ./skills:/home/node/.openclaw/skills
      - ./shared:/home/node/.openclaw/shared
      - ./memory:/home/node/.openclaw/memory
      - ./workspace:/home/node/.openclaw/workspace
      - ./canvas:/home/node/.openclaw/canvas
      - ./cron:/home/node/.openclaw/cron
      - ./telegram:/home/node/.openclaw/telegram
      # Obsidian vault — full My Docs vault (bot files in To claw/ subfolder)
      - "/Users/abror_mac_mini/Library/Mobile Documents/iCloud~md~obsidian/Documents/My Docs:/data/obsidian"
      # Bot project for coder agent (git + configs)
      - /Users/abror_mac_mini/Projects/bot:/data/bot
      # Docker socket so coder can restart containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Gemini CLI credentials (for gemini-3.1-pro access)
      - /Users/abror_mac_mini/.gemini:/home/node/.gemini
    environment:
      - NODE_ENV=production
      - HOME=/home/node
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_REFRESH_TOKEN=${OPENCLAW_REFRESH_TOKEN}
      - OPENCLAW_PROJECT_ID=${OPENCLAW_PROJECT_ID}
      - OPENCLAW_EMAIL=${OPENCLAW_EMAIL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - GEMINI_API_KEY=${AI_STUDIO_KEY_1}
      - LITELLM_HOST=http://litellm:4000
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - OBSIDIAN_VAULT_PATH=/data/obsidian/To claw
      - BOT_PROJECT_PATH=/data/bot
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
    networks:
      - default
      - jarvis_net

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "3017:8080"
    volumes:
      - ./searxng:/etc/searxng
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    networks:
      - default
      - jarvis_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN}
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    networks:
      - default
      - jarvis_net

  actual-budget:
    image: actualbudget/actual-server:latest
    container_name: actual-budget
    restart: unless-stopped
    ports:
      - "5006:5006"
    volumes:
      - ./actual-data:/data
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    networks:
      - default
      - jarvis_net

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    restart: "no" # on-demand only — started by web_clip.sh when needed
    profiles: [ crawl ] # not started with regular `docker compose up`
    ports:
      - "11235:11235"
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-crawl4ai-local-secret}
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11235/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
  jarvis_net:
    external: true
