services:
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      - "18788:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
      - ./litellm/.env:/app/.env
      - litellm_data:/app/data
    env_file:
      - ./litellm/.env
    environment:
      # No master key — LiteLLM accepts any Bearer token from openclaw
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - UI_USERNAME=${UI_USERNAME}
      - UI_PASSWORD=${UI_PASSWORD}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - KILOCODE_API_KEY=${KILOCODE_API_KEY}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_API_BASE=${DASHSCOPE_API_BASE}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - DATABASE_URL=postgresql://litellm:${LITELLM_DB_PASSWORD:-litellm}@litellm-db:5432/litellm
      - LITELLM_MODEL_HEALTH_CHECK=False
      - LITELLM_HEALTH_CHECK_INTERVAL=0
      - REDIS_HOST=redis-cache
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-cache:6379/0
      - LITELLM_REDIS_HOST=redis-cache
      - LITELLM_REDIS_PORT=6379
      - LITELLM_REDIS_URL=redis://redis-cache:6379/0

    depends_on:
      - redis
      - litellm-db
    command: --config /app/config.yaml --port 4000 --num_workers 1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    networks:
      - default
      - jarvis_net
    # healthcheck disabled - causes unnecessary /health calls to LiteLLM
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL for LiteLLM (required for UI/history features)
  litellm-db:
    image: postgres:15-alpine
    container_name: litellm-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${LITELLM_DB_PASSWORD:-litellm}
      - POSTGRES_DB=litellm
    volumes:
      - litellm_data:/var/lib/postgresql/data
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U litellm" ]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - ./chroma:/chroma/chroma
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.5'
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.3.12
    container_name: openclaw-latest
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:18789/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 180s
    user: "501:20" # Run as host user for correct file ownership
    group_add:
      - "0" # root group — needed for docker.sock access inside container
    command: [ "sh", "-c", "sudo chmod 666 /var/run/docker.sock 2>/dev/null || true; sudo chmod a+rx /root /root/.bun /root/.bun/bin /root/.bun/bin/bun 2>/dev/null || true; mkdir -p /home/node/.npm /app/extensions /opt/runtime-pip 2>/dev/null || true; sudo chown -R 501:20 /home/node /app/extensions 2>/dev/null || true; python3 -m pip install --break-system-packages google-auth-oauthlib google-auth-httplib2 google-api-python-client 2>/dev/null || true; python3 -c 'import cocoindex' 2>/dev/null || pip3 install --target=/opt/runtime-pip cocoindex 2>/dev/null || true; exec node openclaw.mjs gateway --allow-unconfigured --bind lan" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18789:18789"
      - "18790:18790"
    depends_on:
      - litellm
      - cocoindex-db
    volumes:
      - ./core:/home/node/.openclaw
      - ./prompts:/home/node/.openclaw/prompts
      - ./skills:/home/node/.openclaw/skills
      - ./shared:/home/node/.openclaw/shared
      - ./memory:/home/node/.openclaw/memory
      - ./workspace:/home/node/.openclaw/workspace
      - ./canvas:/home/node/.openclaw/canvas
      - ./cron:/home/node/.openclaw/cron
      - ./telegram:/home/node/.openclaw/telegram
      # Docker CLI binary (static linux arm64 binary — no install needed)
      - ./tools/docker:/usr/local/bin/docker:ro
      # Gemini CLI credentials — persisted across container rebuilds
      - ./core/gemini-config:/home/node/.gemini
      # Technical System Vault (My Docs - configs, logs, metadata)
      - "${SYSTEM_VAULT_PATH:-/Users/abror_mac_mini/Library/Mobile Documents/iCloud~md~obsidian/Documents/My Docs}:/data/obsidian"
      # User Working Vault (abror - daily notes, reports, ideas)
      - "${USER_VAULT_PATH:-/Users/abror_mac_mini/Documents/abror}:/data/abror_vault"
      # Bot project for coder agent (git + configs)
      - /Users/abror_mac_mini/Projects/bot:/data/bot
      # Docker socket so coder can restart containers
      - /var/run/docker.sock:/var/run/docker.sock
      # OpenCode for container — separate from host ~/.config/opencode
      # Host ~/.config/opencode uses localhost:18788; container uses litellm:4000
      - ./opencode:/home/node/.config/opencode
      - ./opencode-acpx:/home/node/.acpx
      - /Users/abror_mac_mini/.local/share/opencode:/home/node/.local/share/opencode
      - ./switch_opencode.sh:/usr/local/bin/switch_opencode.sh:ro
      # Pip packages for Google API access
      - ./pip:/opt/pip-packages:ro
      # Runtime pip packages (cocoindex etc) — persisted across restarts
      - runtime_pip:/opt/runtime-pip
    environment:
      - NODE_ENV=production
      - HOME=/home/node
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_REFRESH_TOKEN=${OPENCLAW_REFRESH_TOKEN}
      - OPENCLAW_PROJECT_ID=${OPENCLAW_PROJECT_ID}
      - OPENCLAW_EMAIL=${OPENCLAW_EMAIL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - LITELLM_HOST=http://litellm:4000
      - LITELLM_API_KEY=sk-litellm-openclaw-proxy
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - SYSTEM_VAULT_PATH=/data/obsidian/vault
      - USER_VAULT_PATH=/data/obsidian/vault
      - BOT_PROJECT_PATH=/data/bot
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}  # legacy: Actual Budget removed, replaced by Sure PFM
      - VIKUNJA_TOKEN=${VIKUNJA_TOKEN}
      - PLAUD_TOKEN=${PLAUD_TOKEN}
      - PLAUD_API_DOMAIN=${PLAUD_API_DOMAIN}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - KILOCODE_API_KEY=${KILOCODE_API_KEY}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - BYBIT_API=${BYBIT_API}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET}
      - RYOT_URL=http://ryot:8000/backend/graphql
      - RYOT_TOKEN=${RYOT_TOKEN}
      - EMAIL_PASS_GMAIL_PERSONAL=${EMAIL_PASS_GMAIL_PERSONAL}
      - EMAIL_PASS_GMAIL_VERTEX=${EMAIL_PASS_GMAIL_VERTEX}
      - EMAIL_PASS_GMAIL_BASE=${EMAIL_PASS_GMAIL_BASE}
      - EMAIL_PASS_OUTLOOK=${EMAIL_PASS_OUTLOOK}
      - EMAIL_PASS_HOTMAIL=${EMAIL_PASS_HOTMAIL}
      - EMAIL_PASS_ICLOUD=${EMAIL_PASS_ICLOUD}
      - EMAIL_PASS_MECOM=${EMAIL_PASS_MECOM}
      - EMAIL_PASS_MAILRU=${EMAIL_PASS_MAILRU}
      - EMAIL_PASS_YANDEX=${EMAIL_PASS_YANDEX}
      - EMAIL_PASS_YAHOO=${EMAIL_PASS_YAHOO}
      - PYTHONPATH=/usr/local/lib/python3.11/dist-packages:/usr/lib/python3/dist-packages:/opt/pip-packages/local/lib/python3.11/dist-packages:/opt/pip-packages/local/lib/python3.11/site-packages:/opt/runtime-pip
      - CHROMA_HOST=http://chromadb:8000
      - COCOINDEX_DATABASE_URL=postgresql://cocoindex:cocoindex@cocoindex-db:5432/cocoindex
      - VIKING_HOST=http://viking-bridge:8100
      - VIKING_API_KEY=viking-local-key-12345
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Note: Setting GEMINI_API_KEY means gemini CLI uses API key instead of OAuth
      # This is needed for LCM (Lossless Context Management) to create summaries
      - GOOGLE_GENAI_USE_GCA=true
      - GEMINI_CONFIG_DIR=/home/node/.gemini
    networks:
      - default
      - jarvis_net

  gemini-cli:
    build:
      context: ./gemini-cli
      dockerfile: Dockerfile
    container_name: gemini-cli
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NODE_ENV=production
    volumes:
      - ./gemini-cli/data:/home/gemini/.gemini
      - ./shared:/home/gemini/shared:ro
      - ./workspace:/home/gemini/workspace:rw
    networks:
      - default
      - jarvis_net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    healthcheck:
      test: [ "CMD-SHELL", "node --version || exit 1" ]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "3017:8080"
    volumes:
      - ./searxng:/etc/searxng
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    ports:
      - "8096:8090"
    volumes:
      - beszel_data:/beszel_data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PORT=8090
      - DOCKER_HOST=unix:///var/run/docker.sock
    networks:
      - jarvis_net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8090 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN}
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - jarvis_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # actual-budget:
    # DEPRECATED: replaced by Sure PFM. Uncomment only if Actual Budget is needed again.
    # image: actualbudget/actual-server:latest
    # container_name: actual-budget
    # restart: unless-stopped
    # ports:
    #   - "5006:5006"
    # volumes:
    #   - ./actual-data:/data
    # deploy:
    #   resources:
    #     limits:
    #       memory: 256m
    #       cpus: '0.5'
    # networks:
    #   - default
    #   - jarvis_net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5006 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Sure PFM (personal finance, replaces Actual Budget) ─────────────────────
  sure:
    image: ghcr.io/we-promise/sure:stable
    container_name: sure
    restart: unless-stopped
    ports:
      - "3020:3000"
    volumes:
      - sure-storage:/rails/storage
    environment:
      POSTGRES_USER: sure
      POSTGRES_PASSWORD: ${SURE_DB_PASSWORD:-sure_password}
      POSTGRES_DB: sure_production
      SECRET_KEY_BASE: ${SURE_SECRET_KEY:-b3c97a4f2e1d8c5b6a9f0e3d7c2b1a4f8e7d6c5b4a3f2e1d0c9b8a7f6e5d4c}
      SELF_HOSTED: "true"
      RAILS_FORCE_SSL: "false"
      RAILS_ASSUME_SSL: "false"
      DB_HOST: sure-db
      DB_PORT: 5432
      REDIS_URL: redis://redis-cache:6379/2
      OPENAI_BASE_URL: http://litellm:4000/v1
      OPENAI_ACCESS_TOKEN: ${LITELLM_MASTER_KEY:-sk-litellm-openclaw-proxy}
    depends_on:
      sure-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sure-worker:
    image: ghcr.io/we-promise/sure:stable
    container_name: sure-worker
    command: bundle exec sidekiq
    restart: unless-stopped
    volumes:
      - sure-storage:/rails/storage
    environment:
      POSTGRES_USER: sure
      POSTGRES_PASSWORD: ${SURE_DB_PASSWORD:-sure_password}
      POSTGRES_DB: sure_production
      SECRET_KEY_BASE: ${SURE_SECRET_KEY:-b3c97a4f2e1d8c5b6a9f0e3d7c2b1a4f8e7d6c5b4a3f2e1d0c9b8a7f6e5d4c}
      SELF_HOSTED: "true"
      DB_HOST: sure-db
      DB_PORT: 5432
      REDIS_URL: redis://redis-cache:6379/2
    depends_on:
      sure-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - jarvis_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sure-db:
    image: postgres:16-alpine
    container_name: sure-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sure
      POSTGRES_PASSWORD: ${SURE_DB_PASSWORD:-sure_password}
      POSTGRES_DB: sure_production
    volumes:
      - sure_data:/var/lib/postgresql/data
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sure"]
      interval: 10s
      timeout: 5s
      retries: 5

  pinchtab:
    image: pinchtab/pinchtab
    container_name: pinchtab
    restart: unless-stopped
    ports:
      - "9867:9867"
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9867/instances || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    restart: "no" # on-demand only — started by web_clip.sh when needed
    profiles: [ crawl ] # not started with regular `docker compose up`
    ports:
      - "11235:11235"
    environment:
      - CRAWL4AI_API_TOKEN=${CRAWL4AI_API_TOKEN:-crawl4ai-local-secret}
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11235/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  slidev:
    image: ghcr.io/slidevjs/slidev:latest
    container_name: slidev
    restart: unless-stopped
    ports:
      - "3031:3030"
    volumes:
      - ./slidev:/slidev/app
    working_dir: /slidev/app
    command: --port 3030
    networks:
      - jarvis_net

  vault-viewer:
    build:
      context: ./vault-viewer
      dockerfile: Dockerfile
    container_name: vault-viewer
    restart: unless-stopped
    ports:
      - "7080:7080"
    environment:
      - PORT=7080
      - VAULT_PATH=/data/obsidian/vault
    volumes:
      - "${SYSTEM_VAULT_PATH:-/Users/abror_mac_mini/Library/Mobile Documents/iCloud~md~obsidian/Documents/My Docs}:/data/obsidian:ro"
      - "./core:/home/node/.openclaw:ro"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:7080/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  a2ui-webapp:
    build:
      context: .
      dockerfile: a2ui-webapp.Dockerfile
    container_name: a2ui-webapp
    restart: unless-stopped
    ports:
      - "7090:80"
    networks:
      - default
      - jarvis_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  viking-bridge:
    build: ./viking-bridge
    container_name: viking-bridge
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      - ./memory/viking:/data/viking
    environment:
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=sk-litellm-openclaw-proxy
      - EMBEDDING_MODEL=nomic-embed-text
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.5'
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cocoindex-db:
    image: pgvector/pgvector:pg17
    container_name: cocoindex-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=cocoindex
      - POSTGRES_PASSWORD=cocoindex
      - POSTGRES_DB=cocoindex
    ports:
      - "15432:5432"
    volumes:
      - cocoindex_data:/var/lib/postgresql/data
    networks:
      - default
      - jarvis_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocoindex"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  litellm_data:
  beszel_data:
  cocoindex_data:
  runtime_pip:
  sure_data:
  sure-storage:


networks:
  default:
  jarvis_net:
    external: true
