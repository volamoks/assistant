services:
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - default
      - jarvis_net

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      - "18788:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
      - ./litellm/.env:/app/.env
    environment:
      # No master key — LiteLLM accepts any Bearer token from openclaw
      - VERTEXAI_PROJECT=${LITELLM_VERTEX_PROJECT}
      - GOOGLE_OAUTH_ACCESS_TOKEN=${LITELLM_GOOGLE_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - redis
    command: --config /app/config.yaml --port 4000 --num_workers 1
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    networks:
      - default
      - jarvis_net

  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - ./chroma:/chroma/chroma
    networks:
      - default
      - jarvis_net

  openclaw:
    image: home-server-openclaw:audio
    container_name: openclaw-latest
    restart: unless-stopped
    user: "root"
    command: [ "node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--bind", "lan" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18789:18789"
    depends_on:
      - litellm
    volumes:
      - ./core:/home/node/.openclaw
      - ./prompts:/home/node/.openclaw/prompts
      - ./skills:/home/node/.openclaw/skills
      - ./shared:/home/node/.openclaw/shared
      - ./memory:/home/node/.openclaw/memory
      - ./workspace:/home/node/.openclaw/workspace
      - ./canvas:/home/node/.openclaw/canvas
      - ./cron:/home/node/.openclaw/cron
      - ./telegram:/home/node/.openclaw/telegram
      # Obsidian vault — full My Docs vault (bot files in To claw/ subfolder)
      - "/Users/abror_mac_mini/Library/Mobile Documents/iCloud~md~obsidian/Documents/My Docs:/data/obsidian"
      # Bot project for coder agent (git + configs)
      - /Users/abror_mac_mini/Projects/bot:/data/bot
      # Docker socket so coder can restart containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - HOME=/home/node
      - DEBUG=openclaw:*
      - OPENCLAW_GATEWAY_TOKEN=my-secure-token-123
      - OPENCLAW_REFRESH_TOKEN=${OPENCLAW_REFRESH_TOKEN}
      - OPENCLAW_PROJECT_ID=${OPENCLAW_PROJECT_ID}
      - OPENCLAW_EMAIL=${OPENCLAW_EMAIL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OBSIDIAN_VAULT_PATH=/data/obsidian/To claw
      - BOT_PROJECT_PATH=/data/bot
    networks:
      - default
      - jarvis_net

  unstructured-api:
    image: downloads.unstructured.io/unstructured-io/unstructured-api:latest
    container_name: unstructured-api
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "8001:8000"
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2.0'
    networks:
      - default
      - jarvis_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN}
    networks:
      - default
      - jarvis_net

networks:
  default:
  jarvis_net:
    external: true
