# Home Infrastructure Services
# Run separately: docker compose -f docker-compose.home.yml up -d

version: '3.8'

networks:
  jarvis_net:
    name: jarvis_net
    external: true

volumes:
  torrserver_data:
  adguard_data:


services:
  # --- 📺 TORRENT SERVER ---
  torrserver:
    image: ghcr.io/yourok/torrserver:latest
    container_name: torrserver
    restart: always
    network_mode: host
    volumes:
      - torrserver_data:/data
    environment:
      - TS_PORT=8090
      - TS_CACHE_SIZE=2048
      - TS_PRELOAD_BUFFER=true
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8090/echo > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- 🛡️ ADGUARD HOME ---
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - "80:80/tcp"
      - "853:853/tcp"
      - "3000:3000/tcp"
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - adguard_data:/opt/adguardhome/work
    environment:
      - TZ=Asia/Tashkent
    networks:
      - jarvis_net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- 🏠 HOMEPAGE DASHBOARD ---
  homepage:
    image: gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3012:3000"
    volumes:
      - ./homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Tashkent
      - HOMEPAGE_ALLOWED_HOSTS=localhost:3012,host.docker.internal:3012
    networks:
      - jarvis_net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/healthz || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
