version: '3.8'

networks:
  jarvis_net:
    name: jarvis_net
    driver: bridge

volumes:
  postgres_data:
  postgres_backup:
  planka_avatars:
  planka_project_backgrounds:
  planka_attachments:
  ryot_data:
  searxng_data:
  chromadb_data:
  n8n_data:
  uptime_kuma_data:
  beszel_data:


services:
  # --- 🗄️ DATABASE & BACKUP ---
  apps-postgres:
    image: postgres:16-alpine
    container_name: apps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: defaultdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jarvis_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d defaultdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: apps-postgres
      POSTGRES_DB: ryot
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    volumes:
      - postgres_backup:/backups
    networks:
      - jarvis_net
    depends_on:
      apps-postgres:
        condition: service_healthy

  ryot:
    image: ghcr.io/ignisda/ryot:latest
    container_name: ryot
    restart: unless-stopped
    ports:
      - "3014:8000"
    environment:
      - DATABASE_URL=postgres://admin:${POSTGRES_PASSWORD}@apps-postgres:5432/ryot
      - SERVER_ADMIN_ACCESS_TOKEN=${RYOT_ADMIN_TOKEN}
    volumes:
      - ryot_data:/data
    networks:
      - jarvis_net
    depends_on:
      apps-postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- 🧠 AI FOUNDATION (JARVIS EXTENSIONS) ---
  browserless:
    image: ghcr.io/browserless/chromium
    container_name: browserless
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - TOKEN=${BROWSERLESS_TOKEN}
      - CONNECTION_TIMEOUT=60000
      - CONCURRENT=5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/json/version" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jarvis_net

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "3016:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:3016/
      - GENERIC_TIMEZONE=Asia/Tashkent
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - jarvis_net

  # --- 📊 MONITORING ---
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma-monitor
    restart: unless-stopped
    ports:
      - "3003:3001"
    volumes:
      - uptime_kuma_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jarvis_net

  # --- 🔍 NETWORK MONITORING ---
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    ports:
      - "8096:8090"
    volumes:
      - beszel_data:/beszel_data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PORT=8090
      - DOCKER_HOST=unix:///var/run/docker.sock
    networks:
      - jarvis_net

  # beszel-agent — запущен нативно на Mac для полных метрик хоста (диски, CPU, RAM)
  # brew install henrygd/beszel/beszel-agent && brew services start beszel-agent
  # Config: ~/.config/beszel/beszel-agent.env  |  Logs: ~/.cache/beszel/beszel-agent.log
  # Beszel hub подключается к агенту по: host.docker.internal:45876

  # --- 🌐 CLOUDFLARE TUNNEL ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN}
    networks:
      - jarvis_net

  # --- 📋 VIKUNJA (Task Manager) ---
  vikunja:
    image: vikunja/vikunja
    container_name: vikunja
    restart: unless-stopped
    user: "501:20"
    environment:
      - VIKUNJA_SERVICE_JWTSECRET=vikunja-secret-change-me
      - VIKUNJA_SERVICE_TIMEZONE=Asia/Tashkent
      - VIKUNJA_SERVICE_MAXITEMSPERPAGE=100
      - VIKUNJA_SERVICE_PUBLICURL=http://localhost:3456/
      - VIKUNJA_DATABASE_TYPE=sqlite
      - VIKUNJA_DATABASE_PATH=/app/vikunja/files/vikunja.db
    volumes:
      - ./vikunja:/app/vikunja/files
    networks:
      - jarvis_net
    ports:
      - "3456:3456"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3456/api/v1/info || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
