# AUTO-GENERATED MODEL CONFIG
# Updated: 2026-03-15
# Local models for cron, cloud for user messages

model_list:
  # === CLAW-MAIN (Primary conversation - user messages) ===
  - model_name: claw-main
    litellm_params:
      model: openai/MiniMax-M2.5
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
      extra_headers:
        x-litellm-source: "telegram"
        x-litellm-user: "telegram-user"
    metadata:
      user_tag: "telegram-user"
      purpose: "user_conversation"

  # === CLAW-CODER (Coding tasks) ===
  - model_name: claw-coder
    litellm_params:
      model: openai/MiniMax-M2.5
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
      extra_headers:
        x-litellm-source: "telegram"
        x-litellm-user: "telegram-user"
    metadata:
      user_tag: "telegram-user"
      purpose: "coding"

  # === CLAW-THINKING (Deep reasoning) ===
  - model_name: claw-thinking
    litellm_params:
      model: openai/MiniMax-M2.5
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
      extra_headers:
        x-litellm-source: "telegram"
        x-litellm-user: "telegram-user"
    metadata:
      user_tag: "telegram-user"
      purpose: "reasoning"

  - model_name: claw-architect
    litellm_params:
      model: openai/MiniMax-M2.5
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
      extra_headers:
        x-litellm-source: "telegram"
        x-litellm-user: "telegram-user"
    metadata:
      user_tag: "telegram-user"
      purpose: "architecture"

  # === CRON MODELS (Local Ollama - fast & free) ===
  - model_name: claw-cron-fast
    litellm_params:
      model: ollama_chat/qwen3.5:0.8b
      api_base: os.environ/OLLAMA_HOST
      extra_headers:
        x-litellm-source: "cron"
        x-litellm-user: "local-cron"
    metadata:
      user_tag: "local-cron"
      purpose: "cron_fast"

  - model_name: claw-cron-smart
    litellm_params:
      model: ollama_chat/qwen3.5:9b
      api_base: os.environ/OLLAMA_HOST
      extra_headers:
        x-litellm-source: "cron"
        x-litellm-user: "local-cron"
    metadata:
      user_tag: "local-cron"
      purpose: "cron_smart"

  # === LOCAL MODELS (Direct Ollama access) ===
  - model_name: local-small
    litellm_params:
      model: ollama_chat/qwen3.5:0.8b
      api_base: os.environ/OLLAMA_HOST
      extra_headers:
        x-litellm-source: "cron"
        x-litellm-user: "local-cron"
    metadata:
      user_tag: "local-cron"
      purpose: "local_cron"

  - model_name: local-medium
    litellm_params:
      model: ollama_chat/qwen3.5:9b
      api_base: os.environ/OLLAMA_HOST
      extra_headers:
        x-litellm-source: "cron"
        x-litellm-user: "local-cron"
    metadata:
      user_tag: "local-cron"
      purpose: "local_cron"

  # === KILOCODE MODELS (Fallback when Ollama fails) ===
  - model_name: kilo-deepseek-chat
    litellm_params:
      model: openai/deepseek/deepseek-chat
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY
      extra_headers:
        x-litellm-source: "fallback"
        x-litellm-user: "fallback-agent"
    metadata:
      user_tag: "fallback-agent"
      purpose: "fallback"

  # === CLAW-RESEARCHER ===
  - model_name: claw-researcher
    litellm_params:
      model: openai/MiniMax-M2.5
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
      extra_headers:
        x-litellm-source: "telegram"
        x-litellm-user: "telegram-user"

  # === CLAW-VISION ===
  - model_name: claw-vision
    litellm_params:
      model: openai/MiniMax-M2.5
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
      extra_headers:
        x-litellm-source: "telegram"
        x-litellm-user: "telegram-user"

  # === CLAW-FREE (KiloCode fallback) ===
  - model_name: claw-free-fast
    litellm_params:
      model: openai/deepseek/deepseek-chat
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY
      extra_headers:
        x-litellm-source: "fallback"
        x-litellm-user: "fallback-agent"

  - model_name: claw-free-smart
    litellm_params:
      model: openai/deepseek/deepseek-chat
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY
      extra_headers:
        x-litellm-source: "fallback"
        x-litellm-user: "fallback-agent"

litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: redis-cache
  request_timeout: 300
  json_logs: true
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
  additional_params:
    - "x-litellm-source"
    - "x-litellm-user"
    - "x-litellm-session-id"
    - "x-litellm-agent-type"
  metadata:
    source: "openclaw"
    bot_name: "OpenClaw"
    environment: "production"
  ui_access_mode: "admin"
  master_key: os.environ/LITELLM_MASTER_KEY
  store_prompts_in_spend_logs: true
  pass_through_headers: true

router_settings:
  fallbacks:
    # Cron models: KiloCode fallback (when Ollama fails)
    - claw-cron-fast: ["kilo-deepseek-chat"]
    - claw-cron-smart: ["kilo-deepseek-chat"]
    - local-small: ["kilo-deepseek-chat"]
    - local-medium: ["kilo-deepseek-chat"]
    # Main models: MiniMax → KiloCode
    - claw-main: ["kilo-deepseek-chat"]
    - claw-coder: ["kilo-deepseek-chat"]
    - claw-thinking: ["kilo-deepseek-chat"]
    - claw-architect: ["kilo-deepseek-chat"]
    - claw-researcher: ["kilo-deepseek-chat"]
    - claw-vision: ["kilo-deepseek-chat"]
    - claw-summarizer: ["kilo-deepseek-chat"]
    # Free models: KiloCode only
    - claw-free-fast: ["kilo-deepseek-chat"]
    - claw-free-smart: ["kilo-deepseek-chat"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  model_health_check: false
  health_check_interval: 0