  # Gemini 2.0 Flash
  - model_name: gemini-2-0-flash
    litellm_params:
      model: vertex_ai/gemini-2.0-flash-001
      vertex_project: crucial-river-3zftk
      vertex_location: asia-south1

  - model_name: gemini-2-0-flash-2-0
    litellm_params:
      model: vertex_ai/gemini-2.0-flash-001
      vertex_project: crucial-river-3zftk
      vertex_location: asia-south1

  # Legacy Gemini 3 models (maps to 2.0)
  - model_name: gemini-3-flash
    litellm_params:
      model: vertex_ai/gemini-2.0-flash-001
      vertex_project: crucial-river-3zftk
      vertex_location: asia-south1

