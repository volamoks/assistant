      vertex_project: crucial-river-3zftk
      vertex_location: asia-south1

  - model_name: gemini-3-pro-high
    litellm_params:
      model: vertex_ai/gemini-2.0-pro-exp
      vertex_project: crucial-river-3zftk
      vertex_location: asia-south1

  - model_name: google-antigravity/gemini-3-pro-high
    litellm_params:
      model: vertex_ai/gemini-2.0-pro-exp
      vertex_project: crucial-river-3zftk
      vertex_location: asia-south1

  # DeepSeek via API
  - model_name: deepseek/deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
      api_base: https://api.deepseek.com/v1

  - model_name: deepseek/deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY
      api_base: https://api.deepseek.com/v1

  # DeepSeek via OpenRouter
  - model_name: openrouter/deepseek/deepseek-chat
    litellm_params:
      model: openrouter/deepseek/deepseek-chat
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: or-deepseek-chat
    litellm_params:
      model: openrouter/deepseek/deepseek-chat

  - model_name: openrouter/deepseek/deepseek-v3.2
    litellm_params:
      model: openrouter/deepseek/deepseek-v3.2
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: openrouter/deepseek/deepseek-r1
    litellm_params:
      model: openrouter/deepseek/deepseek-r1
      api_key: os.environ/OPENROUTER_API_KEY

  # Minimax via OpenRouter
  - model_name: openrouter/minimax/minimax-01
    litellm_params:
      model: openrouter/minimax/minimax-01
      api_key: os.environ/OPENROUTER_API_KEY

  # Minimax via LiteLLM
  - model_name: minimax/MiniMax-M2.5
    litellm_params:
      model: minimax/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY

  # === AI Studio keys (load balanced — fallback when Vertex AI throttles) ===
  - model_name: gemini-3-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/AI_STUDIO_KEY_1

  - model_name: gemini-3-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/AI_STUDIO_KEY_2

  - model_name: gemini-3-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/AI_STUDIO_KEY_3

  - model_name: fast
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/AI_STUDIO_KEY_1

  - model_name: fast
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/AI_STUDIO_KEY_2

  - model_name: fast
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/AI_STUDIO_KEY_3

  - model_name: google-antigravity/gemini-3-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/AI_STUDIO_KEY_1

  - model_name: google-antigravity/gemini-3-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/AI_STUDIO_KEY_2

  - model_name: google-antigravity/gemini-3-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/AI_STUDIO_KEY_3

  # Local Ollama
  - model_name: ollama/llama3.2:1b
    litellm_params:
      model: ollama_chat/llama3.2:1b
      api_base: http://ollama:11434

  - model_name: ollama/qwen3:8b
    litellm_params:
      model: ollama_chat/qwen3:8b
      api_base: http://ollama:11434

  - model_name: ollama/qwen2.5:7b
    litellm_params:
      model: ollama_chat/qwen2.5:7b
      api_base: http://ollama:11434

  - model_name: ollama/deepseek-r1:14b
    litellm_params:
      model: ollama_chat/deepseek-r1:14b
      api_base: http://ollama:11434

litellm_settings:
  drop_params: true
  request_timeout: 600
  num_retries: 2
  stream: true
  log_level: DEBUG
  log_requests: true
  log_cache_stats: true

router_settings:
  # Add generic aliases to fallbacks
  fallbacks:
    - smart: ["fast", "gemini-3-flash", "deepseek/deepseek-chat"]
    - fast: ["gemini-3-flash", "deepseek/deepseek-chat"]
    - thinking: ["deepseek/deepseek-chat", "ollama/deepseek-r1:14b"]
    - gemini-3-flash: ["deepseek/deepseek-chat", "deepseek/deepseek-reasoner"]
    - google-antigravity/gemini-3-flash: ["gemini-3-flash", "deepseek/deepseek-chat"]
    - gemini-2-5-flash: ["gemini-3-flash", "deepseek/deepseek-chat"]
    - gemini-2-5-pro: ["fast", "gemini-3-flash", "deepseek/deepseek-chat"]
    - gemini-2-0-flash: ["gemini-3-flash", "deepseek/deepseek-chat"]
    - gemini-2-0-flash-2-0: ["gemini-3-flash", "deepseek/deepseek-chat"]
    - minimax/MiniMax-M2.5: ["deepseek/deepseek-chat", "deepseek/deepseek-reasoner"]
    - openrouter/deepseek/deepseek-chat: ["deepseek/deepseek-reasoner"]
  retry_policy:
    RateLimitError: 2
    ServiceUnavailableError: 2
    GatewayTimeoutError: 2
    ConnectionError: 2
    AuthenticationError: 2
    UnauthorizedError: 2

# LiteLLM master key for authentication
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
cache_responses: true
cache_config:
  type: redis
  host: redis
  port: 6379
  # local cache (in-memory) alternative:
  # type: local
