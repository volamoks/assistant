middleware:
  - path: ./middleware.py
    class: middleware.AgentSignatureMiddleware

model_list:
  # =========================================================
  # === OpenClaw canonical aliases — THE ONLY MODELS THE BOT SEES ===
  # =========================================================

  # --- claw-main: Primary model for conversations + orchestration ---
  - model_name: claw-main
    litellm_params:
      model: openai/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1

  # --- claw-coder: Specialized for implementation ---
  - model_name: claw-coder
    litellm_params:
      model: openai/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1

  # --- claw-architect / claw-thinking: Deep reasoning ---
  - model_name: claw-architect
    litellm_params:
      model: openai/deepseek-reasoner
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: claw-thinking
    litellm_params:
      model: openai/deepseek-reasoner
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY

  # --- claw-researcher: Exploration and analysis ---
  - model_name: claw-researcher
    litellm_params:
      model: openai/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1

  # --- claw-vision: Image processing ---
  - model_name: claw-vision
    litellm_params:
      model: openai/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1

  # --- claw-summarizer: Context compaction ---
  - model_name: claw-summarizer
    litellm_params:
      model: openai/MiniMax-M2.5-highspeed
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1

  # ==========================================
  # === FREE MODEL POOLS (Rotation & Failover) ===
  # ==========================================

  # --- claw-free-fast: Low-latency, free tasks ---
  - model_name: claw-free-fast
    litellm_params:
      model: openai/minimax/minimax-m2.5:free
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY
  - model_name: claw-free-fast
    litellm_params:
      model: openai/minimax-m2.5-free
      api_base: https://opencode.ai/zen/v1
      api_key: os.environ/OPENCODE_API_KEY
  - model_name: claw-free-fast
    litellm_params:
      model: openai/stepfun/step-3.5-flash:free
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY

  # --- claw-free-smart: Intelligent, free tasks ---
  - model_name: claw-free-smart
    litellm_params:
      model: openai/moonshotai/kimi-k2.5:free
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY
  - model_name: claw-free-smart
    litellm_params:
      model: openai/deepseek/deepseek-chat
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY
  - model_name: claw-free-smart
    litellm_params:
      model: openai/minimax/minimax-m2.5:free
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY

  # ==========================================
  # Cron Agents - ALL LOCAL (FREE)
  # ==========================================

  - model_name: claw-cron-fast
    litellm_params:
      model: ollama_chat/qwen3.5:0.8b
      api_base: os.environ/OLLAMA_HOST
      timeout: 30
      stream: false

  - model_name: claw-cron-smart
    litellm_params:
      model: ollama_chat/qwen3.5:9b
      api_base: os.environ/OLLAMA_HOST
      timeout: 60
      stream: false

  # ==========================================
  # === LOCAL MODELS (Ollama) & ALIASES ===
  # ==========================================

  - model_name: local-small
    litellm_params:
      model: ollama_chat/qwen3.5:0.8b
      api_base: os.environ/OLLAMA_HOST
      timeout: 30
      stream: false

  - model_name: local-medium
    litellm_params:
      model: ollama_chat/qwen3.5:9b
      api_base: os.environ/OLLAMA_HOST
      timeout: 60
      stream: false

  - model_name: ollama/qwen3.5:0.8b
    litellm_params:
      model: ollama_chat/qwen3.5:0.8b
      api_base: os.environ/OLLAMA_HOST

  - model_name: ollama/qwen3.5:9b
    litellm_params:
      model: ollama_chat/qwen3.5:9b
      api_base: os.environ/OLLAMA_HOST

  - model_name: ollama/llama3.2:1b
    litellm_params:
      model: ollama_chat/llama3.2:1b
      api_base: os.environ/OLLAMA_HOST


  # === Qwen Vision-Language (VL) models ===
  - model_name: qwen3-vl-plus
    litellm_params:
      model: openai/qwen3-vl-plus
      api_base: os.environ/DASHSCOPE_API_BASE
      api_key: os.environ/DASHSCOPE_API_KEY

  # Vision alias for OpenClaw image processing
  - model_name: vision
    litellm_params:
      model: openai/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1

  # Qwen3-Max with vision support
  - model_name: qwen3-max
    litellm_params:
      model: openai/qwen3-max-2026-01-23
      api_base: os.environ/DASHSCOPE_API_BASE
      api_key: os.environ/DASHSCOPE_API_KEY


litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: redis-cache
    port: 6379
  cache_key_params:
    - model
    - messages
    - temperature
    - max_tokens
  drop_params: true
  request_timeout: 300   # ← увеличено до 300 сек для DeepSeek
  num_retries: 2
  log_level: DEBUG
  log_requests: true
  log_cache_stats: true
  # Drop any headers from incoming requests that could identify the client app
  forward_client_headers_to_llm_api: false

router_settings:
  fallbacks:
    # --- Primary Aliases ---
    - claw-main: ["claw-free-smart", "claw-summarizer"]
    - claw-coder: ["claw-free-smart", "claw-summarizer"]
    - claw-architect: ["claw-thinking", "claw-main"]
    - claw-researcher: ["claw-free-smart", "claw-summarizer"]
    - claw-thinking: ["claw-main"]
    - claw-vision: ["claw-free-smart"]
    - claw-summarizer: ["claw-free-fast", "local-medium"]

    # --- Cron Agents ---
    - claw-cron-fast: ["ollama/qwen3.5:0.8b", "ollama/llama3.2:1b"]
    - claw-cron-smart: ["ollama/qwen3.5:9b"]

    # --- Legacy/Specific Fallbacks ---
    - nemotron-super: ["claw-free-smart"]
    - qwen3.5-plus: ["claw-free-smart"]
    - qwen3-max: ["claw-free-smart"]
    - kimi-k2.5: ["claw-free-smart"]
  retry_policy:
    RateLimitError: 2
    ServiceUnavailableError: 2
    GatewayTimeoutError: 2
    ConnectionError: 2
    AuthenticationError: 2
    UnauthorizedError: 2

# LiteLLM master key for authentication
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  model_health_check: false
  health_check_interval: 0
  disable_background_health_checks: true
