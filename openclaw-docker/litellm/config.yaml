# LITELLM MODEL CONFIG
# Providers:
#   minimax.io      — premium subscription
#   kilo.ai         — KILOCODE_API_KEY
#   opencode.ai/zen — OPENCODE_API_KEY (faster routing for Nemotron)
#   ollama          — local

model_list:

  # ── minimax.io premium ─────────────────────────────────────────────────────
  - model_name: minimax-m25
    litellm_params:
      model: openai/MiniMax-M2.5
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
    model_info:
      supports_vision: true

  # ── kilo.ai (KILOCODE_API_KEY) ─────────────────────────────────────────────
  - model_name: kilo-minimax
    litellm_params:
      model: openai/minimax/minimax-m2.5:free
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY
    model_info:
      supports_vision: true

  - model_name: kilo-nemotron
    litellm_params:
      model: openai/nvidia/nemotron-3-super-120b-a12b:free
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY
    model_info:
      supports_reasoning: true

  - model_name: kilo-deepseek
    litellm_params:
      model: openai/deepseek/deepseek-chat
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY

  - model_name: kilo-deepseek-terminus
    litellm_params:
      model: openai/deepseek/deepseek-v3.1-terminus
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/KILOCODE_API_KEY

  # ── opencode.ai quota via kilo.ai gateway (OPENCODE_API_KEY — separate account, faster)
  - model_name: oc-minimax
    litellm_params:
      model: openai/minimax/minimax-m2.5:free
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/OPENCODE_API_KEY
    model_info:
      supports_vision: true

  - model_name: oc-nemotron
    litellm_params:
      model: openai/nvidia/nemotron-3-super-120b-a12b:free
      api_base: https://api.kilo.ai/api/gateway/
      api_key: os.environ/OPENCODE_API_KEY
    model_info:
      supports_reasoning: true

  # ── local Ollama ───────────────────────────────────────────────────────────
  - model_name: local-small
    litellm_params:
      model: ollama/qwen2.5-coder:3b
      api_base: os.environ/OLLAMA_HOST
      temperature: 0.1

  - model_name: local-medium
    litellm_params:
      model: ollama/qwen3.5:9b
      api_base: os.environ/OLLAMA_HOST
      temperature: 0.1

  # ── explicit entry so openclaw finds claw-vision in /v1/models ─────────────
  - model_name: claw-vision
    litellm_params:
      model: openai/MiniMax-M2.5
      api_base: https://api.minimax.io/v1
      api_key: os.environ/MINIMAX_API_KEY
    model_info:
      supports_vision: true

  # ── embeddings ─────────────────────────────────────────────────────────────
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434
      drop_params: true

litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: redis-cache
  request_timeout: 300
  json_logs: true
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
  master_key: os.environ/LITELLM_MASTER_KEY
  store_prompts_in_spend_logs: true
  pass_through_headers: true

router_settings:
  model_group_alias:
    # Premium MiniMax
    claw-main: minimax-m25
    claw-coder: minimax-m25
    claw-researcher: minimax-m25
    claw-architect: minimax-m25
    claw-thinking: minimax-m25
    claw-vision: minimax-m25
    # Free MiniMax — kilo.ai quota
    claw-free-fast: kilo-minimax
    # Free MiniMax — opencode.ai quota
    claw-opencode: oc-minimax
    claw-free-smart: oc-minimax
    # Nemotron — opencode.ai (fast), kilo.ai fallback
    claw-reasoning: oc-nemotron
    nemotron-free: oc-nemotron
    # Cheap DeepSeek
    claw-cheap: kilo-deepseek
    # Local
    claw-cron-fast: local-small
    claw-cron-smart: local-medium

  fallbacks:
    - minimax-m25:          ["oc-minimax", "kilo-minimax", "local-medium"]
    - oc-minimax:           ["kilo-minimax", "local-medium"]
    - kilo-minimax:         ["oc-minimax", "local-medium"]
    - oc-nemotron:          ["kilo-nemotron", "oc-minimax", "kilo-minimax"]
    - kilo-nemotron:        ["oc-nemotron", "oc-minimax", "kilo-minimax"]
    - kilo-deepseek:        ["oc-minimax", "kilo-minimax"]
    - kilo-deepseek-terminus: ["kilo-deepseek", "oc-minimax"]
    - local-small:          ["oc-minimax", "kilo-minimax"]
    - local-medium:         ["oc-minimax", "kilo-minimax"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  model_health_check: false
  health_check_interval: 0
  store_model_in_db: true
  store_prompts_in_spend_logs: true
