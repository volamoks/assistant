litellm_settings:
  success_callback: ["langfuse"]
  drop_params: true
  request_timeout: 600
  num_retries: 2
  stream: true
  log_level: DEBUG
  log_requests: true
  log_cache_stats: true
  # Drop any headers from incoming requests that could identify the client app
  forward_client_headers_to_llm_api: false

router_settings:
  # Add generic aliases to fallbacks
  fallbacks:
    - smart: ["fast", "gemini-3-flash", "deepseek/deepseek-chat"]
    - fast: ["gemini-3-flash", "deepseek/deepseek-chat"]
    - thinking: ["deepseek/deepseek-chat", "ollama/deepseek-r1:14b"]
    - gemini-3-flash: ["deepseek/deepseek-chat", "deepseek/deepseek-reasoner"]
    - google-antigravity/gemini-3-flash: ["gemini-3-flash", "deepseek/deepseek-chat"]
    - gemini-2-5-flash: ["gemini-3-flash", "deepseek/deepseek-chat"]
    - gemini-2-5-pro: ["fast", "gemini-3-flash", "deepseek/deepseek-chat"]
    - gemini-2-0-flash: ["gemini-3-flash", "deepseek/deepseek-chat"]
    - gemini-2-0-flash-2-0: ["gemini-3-flash", "deepseek/deepseek-chat"]
    - minimax/MiniMax-M2.5: ["deepseek/deepseek-chat", "deepseek/deepseek-reasoner"]
    - minimax-portal/MiniMax-M2.5: ["deepseek/deepseek-chat", "deepseek/deepseek-reasoner"]
    - openrouter/deepseek/deepseek-chat: ["deepseek/deepseek-reasoner"]
    - routine: ["gemini-3-flash", "deepseek/deepseek-chat"]
  retry_policy:
    RateLimitError: 2
    ServiceUnavailableError: 2
    GatewayTimeoutError: 2
    ConnectionError: 2
    AuthenticationError: 2
    UnauthorizedError: 2

# LiteLLM master key for authentication
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
cache_responses: true
cache_config:
  type: redis
  host: redis
  port: 6379
  # local cache (in-memory) alternative:
  # type: local
